services:
  ppe-detection-worker:
    build:
      context: .
      args:
        MODEL_SOURCE: "${MODEL_SOURCE:-runs/detect/training/runs/ppe2_archive_4class_from_best_150ep_pat20_v1/weights/best.pt}"
        PERSON_MODEL_SOURCE: "${PERSON_MODEL_SOURCE:-runs/detect/training/runs/ppe_person_yolov8n_finetune_v1/weights/best.pt}"
        FACE_MODEL_SOURCE: "${FACE_MODEL_SOURCE:-test_face_detection/yolov8n-face.pt}"
        WORKER_SOURCE: "${WORKER_SOURCE:-ppe_worker_4.py}"
    image: ai-ppe-detection:latest
    environment:
      MODEL_PATH: /app/best.pt
      PPE_MODEL_PATH: /app/best.pt
      PERSON_MODEL_PATH: /app/person_model.pt
      FACE_MODEL_PATH: /app/yolov8n-face.pt
      BOOT_CONFIDENCE: "0.10"
      BOOT_IOU: "0.45"
      BOOT_IMAGE_SIZE: "1920"
      BOOT_CROP_FOOT_RATIO: "0.45"
      BOOT_CROP_MARGIN: "0.20"
      BOOT_MIN_PERSON_HEIGHT: "45"
      ENABLE_BOOT_CROPS: "FALSE"
      PPE_CREDS_FILE: /app/ppe_creds.txt
      PPE_SNAPSHOT_INTERVAL: "${PPE_SNAPSHOT_INTERVAL:-40}"
      DETECTION_CONFIDENCE: "0.10"
      PERSON_CONFIDENCE: "${PERSON_CONFIDENCE:-0.45}"
      PERSON_IOU: "${PERSON_IOU:-0.70}"
      PERSON_IMAGE_SIZE: "${PERSON_IMAGE_SIZE:-1280}"
      PERSON_AUGMENT_MAX_SCALE: "${PERSON_AUGMENT_MAX_SCALE:-1920}"
      PERSON_FALLBACK_ENABLED: "${PERSON_FALLBACK_ENABLED:-TRUE}"
      PERSON_FALLBACK_THRESHOLD: "${PERSON_FALLBACK_THRESHOLD:-3}"
      ENABLE_CROWD_RECOVERY: "${ENABLE_CROWD_RECOVERY:-FALSE}"
      CROWD_RECOVERY_IOU_CAP: "${CROWD_RECOVERY_IOU_CAP:-0.85}"
      CROWD_RECOVERY_CONF: "${CROWD_RECOVERY_CONF:-0.20}"
      CROWD_RECOVERY_NEW_BOX_IOU: "${CROWD_RECOVERY_NEW_BOX_IOU:-0.30}"
      ENABLE_TILED_PERSON_DETECTION: "${ENABLE_TILED_PERSON_DETECTION:-FALSE}"
      PERSON_MIN_BOX_WIDTH: "${PERSON_MIN_BOX_WIDTH:-12}"
      PERSON_MIN_BOX_HEIGHT: "${PERSON_MIN_BOX_HEIGHT:-45}"
      PERSON_MIN_ASPECT_RATIO: "${PERSON_MIN_ASPECT_RATIO:-1.10}"
      PERSON_MAX_ASPECT_RATIO: "${PERSON_MAX_ASPECT_RATIO:-8.00}"
      PERSON_MATCH_REQUIRED: "${PERSON_MATCH_REQUIRED:-TRUE}"
      PERSON_MATCH_CONF_BYPASS: "${PERSON_MATCH_CONF_BYPASS:-0.40}"
      PERSON_BOX_EXPAND_TOP: "${PERSON_BOX_EXPAND_TOP:-0.20}"
      PERSON_BOX_EXPAND_BOTTOM: "${PERSON_BOX_EXPAND_BOTTOM:-0.20}"
      PERSON_BOX_EXPAND_SIDES: "${PERSON_BOX_EXPAND_SIDES:-0.10}"
      CLASS_CONFIDENCES: "${CLASS_CONFIDENCES:-NO-Hardhat=0.20,NO-Safety Vest=0.20,NO-Safety Boots=0.15}"
      DETECTION_IOU: "0.45"
      IMAGE_SIZE: "${IMAGE_SIZE:-1920}"
      ENABLE_BOOT_COLOR_CHECK: "${ENABLE_BOOT_COLOR_CHECK:-FALSE}"
      BOOT_COLOR_MIN_RATIO: "${BOOT_COLOR_MIN_RATIO:-0.08}"
      CAPTURE_WORKERS: "10"
      UPLOAD_WORKERS: "10"
      DETECTION_BATCH_SIZE: "8"
      DEBUG: "FALSE"
      DRY_RUN: "${DRY_RUN:-FALSE}"
    restart: unless-stopped
